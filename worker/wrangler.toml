name = "abseits-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"

# Erlaubte Herkunft (CORS). Auf deine Pages-Domain setzen, damit nur deine App
# den Proxy nutzen darf. Fuer lokale Tests ggf. voruebergehend "*".
